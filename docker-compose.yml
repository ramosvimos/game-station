services:
  veronica-hub:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID:-}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://veronicahub.com}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
